name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run ESLint
        run: pnpm lint --max-warnings=0
      - name: Run native i18n ESLint regression tests
        run: pnpm lint:native-i18n

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run tsc
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build all publishable packages
        # Uses turbo's dependency-ordered build (core → ui) so a
        # workspace dep can't get published with a stale build.
        run: pnpm exec turbo run build

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Jest
        run: pnpm exec turbo run test -- --coverage --ci --maxWorkers=2
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: '**/coverage/'

      - name: Build coverage badge JSON for shields.io
        if: github.ref == 'refs/heads/main'
        run: |
          # Write badge artifacts to a scratch dir, never into main's tree.
          mkdir -p coverage-output

          for pkg in core ui; do
            summary="packages/$pkg/coverage/coverage-summary.json"
            if [ -f "$summary" ]; then
              PCT=$(jq '.total.lines.pct' "$summary")
              COLOR=$(node -e "const p=$PCT; console.log(p >= 80 ? 'brightgreen' : p >= 60 ? 'yellow' : 'red')")
              echo "{\"schemaVersion\":1,\"label\":\"$pkg coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > "coverage-output/$pkg.json"
            fi
          done

      - name: Publish coverage badges to badges branch
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Store badge JSON on a dedicated orphan `badges` branch so it never
          # pollutes main's history. Self-seeds the branch on first run.
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORK_DIR="$(mktemp -d)"

          if git ls-remote --exit-code --heads "$REMOTE_URL" badges >/dev/null 2>&1; then
            git clone --depth 1 --branch badges --single-branch "$REMOTE_URL" "$WORK_DIR"
          else
            # Branch doesn't exist yet: start a fresh orphan history.
            git init -q "$WORK_DIR"
            git -C "$WORK_DIR" checkout -q --orphan badges
          fi

          # nullglob so a run that produced no badge JSON doesn't fail on a literal glob.
          shopt -s nullglob
          badges=(coverage-output/*.json)
          if [ ${#badges[@]} -eq 0 ]; then
            echo "No coverage badge JSON was produced; nothing to publish."
            exit 0
          fi
          cp "${badges[@]}" "$WORK_DIR"/
          git -C "$WORK_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$WORK_DIR" config user.name "github-actions[bot]"
          git -C "$WORK_DIR" add -A
          # Skip the commit/push entirely when nothing changed.
          if ! git -C "$WORK_DIR" diff --staged --quiet; then
            git -C "$WORK_DIR" commit -m "chore: update coverage badges"
            git -C "$WORK_DIR" push "$REMOTE_URL" HEAD:badges
          fi

  locale-parity:
    name: Locale parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check locale key parity
        run: node scripts/check-locale-parity.mjs

  locale-json-guard:
    name: Locale JSON guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Block hand-edited locale JSON
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "HEAD_COMMIT_MESSAGE=$(git log -1 --pretty=%s)" >> "$GITHUB_ENV"
          node scripts/check-locale-parity.mjs --guard
