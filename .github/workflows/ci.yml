name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run ESLint
        run: pnpm lint --max-warnings=0
      - name: Run native i18n ESLint regression tests
        run: pnpm lint:native-i18n

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run tsc
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build all publishable packages
        # Uses turbo's dependency-ordered build (core → ui) so a
        # workspace dep can't get published with a stale build.
        run: pnpm exec turbo run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Jest
        run: pnpm exec turbo run test -- --coverage --ci --maxWorkers=2
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: '**/coverage/'

      - name: Build coverage badge JSON for shields.io
        run: |
          # Build one shields.io endpoint JSON per package into a scratch dir.
          mkdir -p coverage-output
          for pkg in core ui; do
            summary="packages/$pkg/coverage/coverage-summary.json"
            # Fail loudly rather than silently skip: a missing summary must not
            # let a stale badge stand in for the current run.
            if [ ! -f "$summary" ]; then
              echo "Missing coverage summary: $summary" >&2
              exit 1
            fi
            PCT=$(jq '.total.lines.pct' "$summary")
            COLOR=$(node -e "const p=$PCT; console.log(p >= 80 ? 'brightgreen' : p >= 60 ? 'yellow' : 'red')")
            echo "{\"schemaVersion\":1,\"label\":\"$pkg coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > "coverage-output/$pkg.json"
          done

      - name: Upload coverage badge artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-badges
          path: coverage-output/
          if-no-files-found: ignore

  # Publish the coverage badge JSON to a dedicated `badges` branch so it never
  # lands in main's history. Runs only on main; auth is handled by actions/checkout
  # (the workflow token, never baked into a URL).
  publish-coverage-badges:
    name: Publish coverage badges
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out badges branch
        uses: actions/checkout@v6
        with:
          ref: badges
          path: badges-branch

      - name: Download coverage badge artifacts
        uses: actions/download-artifact@v7
        with:
          name: coverage-badges
          path: coverage-output

      - name: Commit coverage badges to badges branch
        working-directory: badges-branch
        run: |
          shopt -s nullglob
          badges=(../coverage-output/*.json)
          if [ ${#badges[@]} -eq 0 ]; then
            echo "No coverage badge JSON was produced; nothing to publish."
            exit 0
          fi
          # Replace the whole set so a package that produced no summary this run
          # drops its badge instead of showing stale coverage.
          rm -f ./*.json
          cp "${badges[@]}" .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update coverage badges"
          git push

  locale-parity:
    name: Locale parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check locale key parity
        run: node scripts/check-locale-parity.mjs

  locale-json-guard:
    name: Locale JSON guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Block hand-edited locale JSON
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "HEAD_COMMIT_MESSAGE=$(git log -1 --pretty=%s)" >> "$GITHUB_ENV"
          node scripts/check-locale-parity.mjs --guard
