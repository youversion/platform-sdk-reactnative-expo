name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run ESLint
        run: pnpm lint --max-warnings=0

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run tsc
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Jest
        run:  turbo run test -- --coverage --ci --maxWorkers=2
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build library
        run: pnpm build
      - name: Verify build output
        run: |
          test -d dist || (echo "❌ dist/ directory missing" && exit 1)
          test -f dist/index.js || (echo "❌ dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "❌ dist/index.d.ts missing" && exit 1)
          echo "✅ Build output looks valid"
