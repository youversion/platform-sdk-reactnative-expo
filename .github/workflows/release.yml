name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
          The version to publish (bare semver, e.g. 0.1.0). Look at the most
          recent merged PR's Commit Lint comment for the analyzer's
          suggested value, or run locally:
            node scripts/preview-release.mjs \
              --base $(git describe --tags --abbrev=0) --head main
          The chosen value is what actually ships; the calculator's
          value is logged side-by-side for audit.
        required: true
        type: string
      dry-run:
        description: "Run end-to-end up to commit X + tag, then stop. Skips push, GitHub release, npm publish, and Dev-restore."
        required: false
        type: boolean
        default: false
      dist-tag:
        description: "npm dist-tag to publish under (defaults to `latest`). Use `next` for pre-releases."
        required: false
        type: string
        default: latest

permissions:
  contents: write
  issues: write
  pull-requests: write
  # `id-token: write` enables npm provenance via OIDC. The workflow falls
  # back to NPM_TOKEN if PROVENANCE is unset, but OIDC + provenance is the
  # primary path: signed attestation linking the tarball to this run.
  id-token: write

concurrency:
  # Serialize release dispatches per repo — two simultaneous releases
  # would both try to push the same tag and would race on npm.
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run lint, typecheck, tests, build
        # Same gates the PR CI runs. We don't trust a release to ship
        # work that hasn't passed CI just because main was green when
        # the dispatcher clicked the button.
        run: |
          pnpm lint --max-warnings=0
          pnpm typecheck
          pnpm exec turbo run test -- --ci --maxWorkers=2
          pnpm exec turbo run build

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Persist the workflow token so subsequent pushes (commit X,
          # tag, Dev-restore Y) carry an authenticated push identity.
          persist-credentials: true

      - uses: ./.github/actions/setup

      - name: Configure npm registry for publish
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          # Sets `registry=https://registry.npmjs.org` in .npmrc and
          # wires NODE_AUTH_TOKEN to the NPM_TOKEN env below as the
          # fallback auth path. OIDC + provenance is preferred; this
          # makes NPM_TOKEN work transparently if OIDC is unavailable.
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git identity for release commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release orchestrator
        env:
          VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run && '1' || '0' }}
          DIST_TAG: ${{ inputs.dist-tag }}
          # Provenance on by default in CI. publish-npm.sh appends
          # `--provenance` to `pnpm publish` when this is "1", which
          # requires the `id-token: write` permission granted above.
          PROVENANCE: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fallback auth for npm when OIDC isn't usable (e.g. before
          # the npm-side trust policy is configured). publish-npm.sh
          # invokes pnpm/npm which read NODE_AUTH_TOKEN from the
          # setup-node-configured .npmrc.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot][release]"
          GIT_AUTHOR_EMAIL: "github-actions[bot][release]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot][release]"
          GIT_COMMITTER_EMAIL: "github-actions[bot][release]@users.noreply.github.com"
        run: bash scripts/release.sh
